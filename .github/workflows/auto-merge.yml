name: auto-merge

# Enable GitHub's auto-merge on PRs authored by the repo owner so they
# merge as soon as the `ci` required check passes. Other authors' PRs
# still run CI but require a manual `gh pr merge` (or click). Squash is
# the chosen merge method — keeps main history linear, drops the
# burrow/run_xxx branch noise from agent-opened PRs.
#
# Uses AUTO_MERGE_PAT (not GITHUB_TOKEN) so that the resulting push to
# main triggers downstream workflows (CI, Release). GITHUB_TOKEN-authored
# pushes are deliberately suppressed by GitHub to prevent recursive loops.
# See seed warren-a2dc.

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'jayminwest/warren' &&
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == github.repository_owner
    steps:
      # docs/CONSTITUTION.md Article IX: changes to the constitution, the
      # audit triggers, project-tier agent prompts, or this workflow itself
      # require a TRUSTED APPROVER's sign-off (a human, OR a qualified agent:
      # a git/merge-specialist worker, the Codex auditor, or an Opus-4.8-tier
      # agent), recorded as the `article-ix-approved` label. Without that
      # label they never auto-merge. This step is the executable form of
      # that article.
      - name: Article IX check (constitution-protected paths)
        id: protected
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          PROTECTED='^(docs/CONSTITUTION\.md|\.warren/triggers\.yaml|\.canopy/|\.github/workflows/auto-merge\.yml)'
          # Article IX bypass: a trusted approver records sign-off via the
          # `article-ix-approved` label. When present, protected-path PRs may
          # auto-merge — the human-only requirement is delegated to that approver.
          # NOTE: this checks the label EXISTS, not who applied it. Independence
          # / no-self-approval is enforced by the approver's mandate + post-merge
          # audit, not here (a real actor-check needs branch protection/CODEOWNERS).
          LABELS=$(gh pr view "$PR_URL" --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -qx 'article-ix-approved'; then
            echo "hit=false" >> "$GITHUB_OUTPUT"
            echo "Article IX: 'article-ix-approved' label present (trusted-approver sign-off) — auto-merge permitted."
            exit 0
          fi
          CHANGED=$(gh pr view "$PR_URL" --json files -q '.files[].path')
          if echo "$CHANGED" | grep -qE "$PROTECTED"; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "Article IX: protected paths changed and no trusted-approver label — auto-merge will NOT be enabled:"
            echo "$CHANGED" | grep -E "$PROTECTED"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Enable auto-merge (squash)
        if: steps.protected.outputs.hit == 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
